<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>InSpace | Watch</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>

    <!-- Upside-down tree silhouettes at top -->

        <path fill="#050000" d="

          L1428,50 L1412,88 L1396,50
          L1378,50 L1364,72 L1348,50

          L970,50 L956,78 L940,50

    <!-- Left & right vein decorations -->
    <div class="vein-container" aria-hidden="true">
      <svg class="vein-left" viewBox="0 0 130 1000" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
        <path class="vein-path vein-main" d="M8,0 C18,100 3,210 22,330 C35,425 8,525 24,665 C36,770 10,870 28,1000"/>
        <path class="vein-path vein-branch" d="M14,105 C32,94 56,100 82,88"/>
        <path class="vein-path vein-branch" d="M18,210 C40,198 65,205 94,192"/>
        <path class="vein-path vein-branch" d="M22,330 C45,318 72,326 108,312"/>
        <path class="vein-path vein-branch" d="M18,445 C40,432 66,440 98,428"/>
        <path class="vein-path vein-branch" d="M24,570 C48,558 74,566 106,552"/>
        <path class="vein-path vein-branch" d="M20,680 C44,668 70,676 102,662"/>
        <path class="vein-path vein-sub" d="M82,88 C95,78 112,84 126,74"/>
        <path class="vein-path vein-sub" d="M94,192 C106,182 118,188 128,178"/>
        <path class="vein-path vein-sub" d="M108,312 C116,302 126,308 130,298"/>
      </svg>
      <svg class="vein-right" viewBox="0 0 130 1000" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
        <path class="vein-path vein-main" d="M8,0 C18,100 3,210 22,330 C35,425 8,525 24,665 C36,770 10,870 28,1000"/>
        <path class="vein-path vein-branch" d="M14,105 C32,94 56,100 82,88"/>
        <path class="vein-path vein-branch" d="M18,210 C40,198 65,205 94,192"/>
        <path class="vein-path vein-branch" d="M22,330 C45,318 72,326 108,312"/>
        <path class="vein-path vein-branch" d="M18,445 C40,432 66,440 98,428"/>
        <path class="vein-path vein-branch" d="M24,570 C48,558 74,566 106,552"/>
        <path class="vein-path vein-branch" d="M20,680 C44,668 70,676 102,662"/>
        <path class="vein-path vein-sub" d="M82,88 C95,78 112,84 126,74"/>
        <path class="vein-path vein-sub" d="M94,192 C106,182 118,188 128,178"/>
        <path class="vein-path vein-sub" d="M108,312 C116,302 126,308 130,298"/>
      </svg>
    </div>

    <!-- Floating spores -->
    <div class="spores" aria-hidden="true">
      <span class="spore" style="--sx:6%;  --ss:2px; --sd:18s; --delay:0s;   --drift-x:20px"></span>
      <span class="spore" style="--sx:22%; --ss:3px; --sd:14s; --delay:2s;   --drift-x:-15px"></span>
      <span class="spore" style="--sx:40%; --ss:2px; --sd:20s; --delay:4s;   --drift-x:18px"></span>
      <span class="spore" style="--sx:58%; --ss:4px; --sd:16s; --delay:1s;   --drift-x:-22px"></span>
      <span class="spore" style="--sx:72%; --ss:2px; --sd:22s; --delay:6s;   --drift-x:12px"></span>
      <span class="spore" style="--sx:85%; --ss:3px; --sd:17s; --delay:3s;   --drift-x:-16px"></span>
      <span class="spore" style="--sx:50%; --ss:2px; --sd:13s; --delay:8s;   --drift-x:25px"></span>
      <span class="spore" style="--sx:30%; --ss:2px; --sd:19s; --delay:10s;  --drift-x:-10px"></span>
    </div>

    <header class="topbar">
      <h1>&#9670; INSPACE BROADCAST</h1>
      <div>
        <span id="whoami"></span>
        <button id="logout">LOGOUT</button>
      </div>
    </header>

    <main class="panel player-panel">
      <h2 id="source-label">Awaiting source...</h2>
      <div class="muted">STATUS: <span id="sync-state">SYNCHRONIZING</span></div>
      <div class="muted">SYNC OFFSET: <span id="offset">0.00s</span></div>

      <div id="local-wrapper" class="player-wrapper hidden">
        <video id="local-video" preload="metadata"></video>
      </div>

      <div id="yt-wrapper" class="player-wrapper hidden">
        <div id="yt-player"></div>
        <!-- Overlay blocks audience from pausing/seeking the YouTube player -->
        <div class="yt-overlay"></div>
      </div>

      <form id="rename-form" class="stack compact" style="margin-top:1rem">
        <label>
          Change Username
          <input type="text" name="username" minlength="3" maxlength="30" required />
        </label>
        <button type="submit">UPDATE NAME</button>
      </form>
    </main>

    <p id="status" class="status"></p>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="/static/player.js"></script>
    <script src="/static/vecna.js"></script>
    <script src="/static/leaves.js"></script>
    <script src="/static/bats.js"></script>
  </body>
</html>
