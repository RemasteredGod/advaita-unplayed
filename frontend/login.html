<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>InSpace | Access</title>
    <link rel="stylesheet" href="/static/style.css" />
    <style>
      .auth-page {
        padding-top: 130px;
        padding-bottom: 2rem;
      }

      .auth-brand {
        text-align: center;
        padding: 1.6rem 1.2rem 1rem;
        background: #000;
        border-bottom: 1px solid #1a1a1a;
      }

      .auth-brand h1 {
        font-family: "Enchanted Land", "Abril Fatface", serif;
        font-size: clamp(2.8rem, 8vw, 6rem);
        letter-spacing: 12px;
        margin-bottom: 0.3rem;
        color: #f0f0f0;
        text-shadow:
          0 0 15px rgba(200, 10, 30, 0.7),
          0 0 40px rgba(150,  0, 20, 0.3);
      }

      .auth-brand .tagline {
        color: #555;
        font-size: 0.72rem;
        letter-spacing: 4px;
        text-transform: uppercase;
        margin: 0;
        font-family: "Share Tech Mono", monospace;
      }

      .auth-divider {
        height: 1px;
        background: linear-gradient(to right,
          transparent,
          rgba(180, 10, 20, 0.6) 30%,
          rgba(200, 15, 30, 0.8) 50%,
          rgba(180, 10, 20, 0.6) 70%,
          transparent);
        margin: 1rem 0 0;
      }

      .auth-tabs {
        display: flex;
        background: #000;
        border-bottom: 1px solid #1a1a1a;
      }

      .auth-tab {
        flex: 1;
        background: none;
        border: none;
        border-bottom: 2px solid transparent;
        border-radius: 0;
        color: #555;
        letter-spacing: 3px;
        padding: 0.8rem 1rem;
        cursor: pointer;
        font-size: 0.85rem;
        font-family: "Share Tech Mono", monospace;
        transition: color 180ms, border-color 180ms, background 180ms;
        box-shadow: none;
      }

      .auth-tab:hover {
        color: #ccc;
        background: rgba(255,255,255,0.03);
        box-shadow: none;
        filter: none;
        border-color: rgba(180,10,20,0.3);
      }

      .auth-tab.active {
        color: #e8e8e8;
        border-bottom-color: rgba(200, 10, 30, 0.8);
        background: rgba(255,255,255,0.02);
      }

      .auth-form-container {
        padding: 1.4rem 1.2rem 1rem;
      }

      .auth-form { display: none; }

      .auth-form.active {
        display: grid;
        gap: 0.85rem;
      }

      .auth-form button[type="submit"] {
        margin-top: 0.5rem;
        padding: 0.8rem;
        font-size: 0.95rem;
        letter-spacing: 3px;
        border-color: rgba(160, 10, 20, 0.4);
      }

      .auth-form button[type="submit"]:hover {
        border-color: rgba(200, 10, 30, 0.7);
      }

      .auth-footer {
        text-align: center;
        color: #333;
        font-size: 0.7rem;
        letter-spacing: 3px;
        font-family: "Share Tech Mono", monospace;
        padding: 0.8rem 1.2rem 1rem;
        border-top: 1px solid #141414;
      }

      .auth-footer .dot {
        color: rgba(180, 10, 20, 0.6);
      }

      /* ── Static Vecna lurker ── */
      .vecna-static {
        position: fixed;
        right: -6%;
        bottom: 0;
        width: clamp(320px, 42vw, 620px);
        pointer-events: none;
        z-index: 6;
        transform-origin: bottom right;
      }

      .vecna-static img {
        width: 100%;
        height: auto;
        display: block;
        filter:
          drop-shadow(0 0 30px rgba(200, 0, 20, 0.75))
          drop-shadow(0 0 80px rgba(140, 0, 12, 0.45))
          contrast(1.1) brightness(0.8);
        opacity: 0.9;
      }

      @keyframes vecna-lurk {
        0%, 100% { transform: rotate(-3deg) translateY(0px); }
        50%       { transform: rotate(-4.5deg) translateY(-12px); }
      }

      .vecna-static {
        animation: vecna-lurk 6s ease-in-out infinite;
      }

      /* hide on narrow screens so it doesn't cover the form */
      @media (max-width: 920px) {
        .vecna-static { display: none; }
      }

      /* ── Mouth lurker (left side) ── */
      .mouth-static {
        position: fixed;
        left: -8%;
        bottom: 0;
        width: clamp(300px, 40vw, 580px);
        pointer-events: none;
        z-index: 6;
        transform-origin: bottom left;
      }

      .mouth-static img {
        width: 100%;
        height: auto;
        display: block;
        /* flip horizontally so it faces inward toward the form */
        transform: scaleX(-1);
        filter:
          drop-shadow(0 0 28px rgba(180, 0, 15, 0.8))
          drop-shadow(0 0 70px rgba(120, 0, 8, 0.5))
          drop-shadow(-10px 0 40px rgba(100, 0, 5, 0.6))
          contrast(1.15) brightness(0.75) saturate(1.2);
        opacity: 0.88;
      }

      @keyframes mouth-breathe {
        0%, 100% { transform: rotate(5deg) translateY(0px) scaleX(0.98); }
        30%       { transform: rotate(4deg) translateY(-6px) scaleX(1); }
        60%       { transform: rotate(6deg) translateY(-14px) scaleX(0.97); }
      }

      .mouth-static {
        animation: mouth-breathe 7s ease-in-out infinite;
      }

      /* red light pulse behind the mouth — simulates interior glow */
      .mouth-static::before {
        content: "";
        position: absolute;
        inset: 10% 5% 0;
        background: radial-gradient(ellipse at 60% 40%,
          rgba(200, 0, 10, 0.35) 0%,
          rgba(100, 0, 5, 0.15) 50%,
          transparent 75%);
        border-radius: 50%;
        filter: blur(18px);
        animation: mouth-glow 7s ease-in-out infinite;
        z-index: -1;
      }

      @keyframes mouth-glow {
        0%, 100% { opacity: 0.6; transform: scale(1); }
        50%       { opacity: 1;   transform: scale(1.12); }
      }

      @media (max-width: 920px) {
        .mouth-static { display: none; }
      }
    </style>
  </head>
  <body class="auth-page">

    <!-- Vein decorations -->
    <div class="vein-container" aria-hidden="true">
      <svg class="vein-left" viewBox="0 0 130 1000" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
        <path class="vein-path vein-main" d="M8,0 C18,100 3,210 22,330 C35,425 8,525 24,665 C36,770 10,870 28,1000"/>
        <path class="vein-path vein-branch" d="M14,105 C32,94 56,100 82,88"/>
        <path class="vein-path vein-branch" d="M18,210 C40,198 65,205 94,192"/>
        <path class="vein-path vein-branch" d="M22,330 C45,318 72,326 108,312"/>
        <path class="vein-path vein-branch" d="M18,445 C40,432 66,440 98,428"/>
        <path class="vein-path vein-branch" d="M24,570 C48,558 74,566 106,552"/>
        <path class="vein-path vein-sub" d="M82,88 C95,78 112,84 126,74"/>
        <path class="vein-path vein-sub" d="M94,192 C106,182 118,188 128,178"/>
      </svg>
      <svg class="vein-right" viewBox="0 0 130 1000" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
        <path class="vein-path vein-main" d="M8,0 C18,100 3,210 22,330 C35,425 8,525 24,665 C36,770 10,870 28,1000"/>
        <path class="vein-path vein-branch" d="M14,105 C32,94 56,100 82,88"/>
        <path class="vein-path vein-branch" d="M18,210 C40,198 65,205 94,192"/>
        <path class="vein-path vein-branch" d="M22,330 C45,318 72,326 108,312"/>
        <path class="vein-path vein-branch" d="M18,445 C40,432 66,440 98,428"/>
        <path class="vein-path vein-branch" d="M24,570 C48,558 74,566 106,552"/>
        <path class="vein-path vein-sub" d="M82,88 C95,78 112,84 126,74"/>
        <path class="vein-path vein-sub" d="M94,192 C106,182 118,188 128,178"/>
      </svg>
    </div>

    <!-- Mouth lurking from bottom-left -->
    <div class="mouth-static" aria-hidden="true">
      <img src="/static/mouth.png" alt="" />
    </div>

    <!-- Permanent Vecna lurking from bottom-right -->
    <div class="vecna-static" aria-hidden="true">
      <img src="/static/vecna.png" alt="" />
    </div>

    <!-- Floating spores -->
    <div class="spores" aria-hidden="true">
      <span class="spore" style="--sx:10%; --ss:2px; --sd:16s; --delay:0s;  --drift-x:18px"></span>
      <span class="spore" style="--sx:28%; --ss:3px; --sd:20s; --delay:3s;  --drift-x:-14px"></span>
      <span class="spore" style="--sx:48%; --ss:2px; --sd:14s; --delay:6s;  --drift-x:22px"></span>
      <span class="spore" style="--sx:65%; --ss:4px; --sd:18s; --delay:1s;  --drift-x:-18px"></span>
      <span class="spore" style="--sx:82%; --ss:2px; --sd:22s; --delay:4s;  --drift-x:12px"></span>
      <span class="spore" style="--sx:55%; --ss:2px; --sd:13s; --delay:9s;  --drift-x:-25px"></span>
    </div>

    <main class="panel auth-panel">

      <!-- Brand -->
      <div class="auth-brand">
        <h1>INSPACE</h1>
        <p class="tagline">synchronized broadcast from the upside down</p>
        <div class="auth-divider"></div>
      </div>

      <!-- Tabs -->
      <div class="auth-tabs" role="tablist">
        <button class="auth-tab active" id="tab-login" role="tab" aria-selected="true" onclick="switchTab('login')">
          LOGIN
        </button>
        <button class="auth-tab" id="tab-register" role="tab" aria-selected="false" onclick="switchTab('register')">
          REGISTER
        </button>
      </div>

      <div class="auth-form-container">
        <!-- Login form (shown first) -->
        <form id="login-form" class="auth-form active">
          <label>
            Username
            <input type="text" name="username" required autocomplete="username" />
          </label>
          <label>
            Password
            <input type="password" name="password" required autocomplete="current-password" />
          </label>
          <button type="submit">ENTER THE UPSIDE DOWN</button>
        </form>

        <!-- Register form -->
        <form id="register-form" class="auth-form">
          <label>
            Username <span style="color:var(--muted);font-size:0.75rem">(optional — random if blank)</span>
            <input type="text" name="username" placeholder="leave blank for random" autocomplete="username" />
          </label>
          <label>
            Password <span style="color:var(--muted);font-size:0.75rem">(min. 6 characters)</span>
            <input type="password" name="password" required minlength="6" autocomplete="new-password" />
          </label>
          <button type="submit">CREATE ACCOUNT</button>
        </form>
      </div>

      <p id="status" class="status"></p>

      <div class="auth-footer">
        <span class="dot">&#9670;</span> INSPACE &mdash; SYNCHRONIZED WATCH PARTY <span class="dot">&#9670;</span>
      </div>
    </main>

    <script>
      function switchTab(tab) {
        const loginForm     = document.getElementById('login-form');
        const registerForm  = document.getElementById('register-form');
        const tabLogin      = document.getElementById('tab-login');
        const tabRegister   = document.getElementById('tab-register');

        if (tab === 'login') {
          loginForm.classList.add('active');
          registerForm.classList.remove('active');
          tabLogin.classList.add('active');
          tabLogin.setAttribute('aria-selected', 'true');
          tabRegister.classList.remove('active');
          tabRegister.setAttribute('aria-selected', 'false');
        } else {
          registerForm.classList.add('active');
          loginForm.classList.remove('active');
          tabRegister.classList.add('active');
          tabRegister.setAttribute('aria-selected', 'true');
          tabLogin.classList.remove('active');
          tabLogin.setAttribute('aria-selected', 'false');
        }
      }
    </script>
    <script src="/static/login.js"></script>
    <script src="/static/vecna.js"></script>
    <script src="/static/leaves.js"></script>
    <script src="/static/bats.js"></script>
  </body>
</html>
