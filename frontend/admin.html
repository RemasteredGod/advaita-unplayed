    <!-- Floating spores -->
    <div class="spores" aria-hidden="true">
      <span class="spore" style="--sx:8%;  --ss:2px; --sd:16s; --delay:0s;   --drift-x:18px"></span>
      <span class="spore" style="--sx:18%; --ss:3px; --sd:20s; --delay:3s;   --drift-x:-12px"></span>
      <span class="spore" style="--sx:32%; --ss:2px; --sd:14s; --delay:1.5s; --drift-x:25px"></span>
      <span class="spore" style="--sx:47%; --ss:4px; --sd:18s; --delay:5s;   --drift-x:-20px"></span>
      <span class="spore" style="--sx:62%; --ss:2px; --sd:22s; --delay:2s;   --drift-x:15px"></span>
      <span class="spore" style="--sx:75%; --ss:3px; --sd:15s; --delay:7s;   --drift-x:-18px"></span>

      <span class="spore" style="--sx:55%; --ss:2px; --sd:12s; --delay:9s;   --drift-x:-10px"></span>
    </div>

    <header class="topbar">
      <h1>&#9670; INSPACE CONTROL TERMINAL</h1>
      <div>
        <span id="whoami"></span>
        <button id="logout">LOGOUT</button>
      </div>
    </header>

    <main class="grid-admin">
      <section class="panel">
        <h2>Source Management</h2>

        <form id="upload-form" class="stack">
          <label>Upload Local Video <input name="video" type="file" accept="video/*" required /></label>
          <label>Title <input name="title" type="text" placeholder="episode-01" /></label>
          <button type="submit">UPLOAD VIDEO</button>
        </form>

        <form id="youtube-form" class="stack" style="margin-top:1rem">
          <label>YouTube URL <input name="url" type="url" placeholder="https://youtube.com/watch?v=..." required /></label>
          <label>Title <input name="title" type="text" placeholder="demo clip" /></label>
          <button type="submit">ADD YOUTUBE SOURCE</button>
        </form>

        <label style="margin-top:1rem">
          Available Sources
          <select id="media-list" size="8"></select>
        </label>
        <button id="activate-source" style="margin-top:0.4rem">SET ACTIVE SOURCE</button>
      </section>

      <section class="panel">
        <h2>Broadcast Controls</h2>
        <div id="source-label" class="muted"></div>
        <div class="control-row" style="margin-top:0.8rem">
          <button id="play">&#9654; PLAY</button>
          <button id="pause">&#9646;&#9646; PAUSE</button>
          <button id="seek-back">&#8592; -10s</button>
          <button id="seek-forward">+10s &#8594;</button>
        </div>
        <input id="seek-slider" type="range" min="0" max="100" value="0" />
        <div class="muted">SYNC OFFSET: <span id="offset">0.00s</span></div>

        <div id="local-wrapper" class="player-wrapper hidden">
          <video id="local-video" controls preload="metadata"></video>
        </div>
        <div id="yt-wrapper" class="player-wrapper hidden">
          <div id="yt-player"></div>
        </div>
      </section>

      <section class="panel">
        <h2>Connected Agents</h2>
        <ul id="connected-users" class="user-list"></ul>
      </section>
    </main>

    <p id="status" class="status"></p>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="/static/admin.js"></script>
    <script src="/static/vecna.js"></script>
    <script src="/static/leaves.js"></script>
    <script src="/static/bats.js"></script>
