<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hawkins Sync | Admin</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <header class="topbar">
      <h1>HAWKINS LAB CONTROL TERMINAL</h1>
      <div>
        <span id="whoami"></span>
        <button id="logout">LOGOUT</button>
      </div>
    </header>

    <main class="grid-admin">
      <section class="panel">
        <h2>Source Management</h2>
        <form id="upload-form" class="stack">
          <label>Upload Local Video <input name="video" type="file" accept="video/*" required /></label>
          <label>Title <input name="title" type="text" placeholder="episode-01" /></label>
          <button type="submit">UPLOAD VIDEO</button>
        </form>

        <form id="youtube-form" class="stack">
          <label>YouTube URL <input name="url" type="url" placeholder="https://youtube.com/watch?v=..." required /></label>
          <label>Title <input name="title" type="text" placeholder="demo clip" /></label>
          <button type="submit">ADD YOUTUBE SOURCE</button>
        </form>

        <label>
          Available Sources
          <select id="media-list" size="8"></select>
        </label>
        <button id="activate-source">SET ACTIVE SOURCE</button>
      </section>

      <section class="panel">
        <h2>Broadcast Controls</h2>
        <div id="source-label" class="muted"></div>
        <div class="control-row">
          <button id="play">PLAY</button>
          <button id="pause">PAUSE</button>
          <button id="seek-back">-10s</button>
          <button id="seek-forward">+10s</button>
        </div>
        <input id="seek-slider" type="range" min="0" max="100" value="0" />
        <div class="muted">SYNC OFFSET: <span id="offset">0.00s</span></div>

        <div id="local-wrapper" class="player-wrapper hidden">
          <video id="local-video" controls preload="metadata"></video>
        </div>
        <div id="yt-wrapper" class="player-wrapper hidden">
          <div id="yt-player"></div>
        </div>
      </section>

      <section class="panel">
        <h2>Connected Agents</h2>
        <ul id="connected-users" class="user-list"></ul>
      </section>
    </main>

    <p id="status" class="status"></p>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="/static/admin.js"></script>
  </body>
</html>
